<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>迷ったらルーレット</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Quicksand:wght@500;700&display=swap');

  :root {
    --sky: #e8f4fd;
    --ocean: #1a6fad;
    --wave: #2e9ed6;
    --foam: #a8d8f0;
    --deep: #0d4a7a;
    --mist: #d0ecf8;
    --accent: #f0a500;
    --white: #ffffff;
    --shadow: rgba(26, 111, 173, 0.18);
    --error: #e05555;

    /* Roulette slice colors - blue tones */
    --r1: #5bb8f5;
    --r2: #2e9ed6;
    --r3: #a8d8f0;
    --r4: #1a6fad;
    --r5: #7ecef4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    overflow: hidden;
    height: 100%;
  }

  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: linear-gradient(160deg, #c8e8fa 0%, #e8f4fd 40%, #b0d8f2 100%);
    min-height: 100%;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100vw;
    max-width: 100vw;
  }

  /* ─── SCREEN CONTAINER ─── */
  .screen {
    display: none;
    width: 100%;
    max-width: 480px;
    padding: 24px 16px 40px;
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    box-sizing: border-box;
  }
  .screen.active { display: flex; }

  /* ─── HEADER ─── */
  .app-title {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 1.5rem;
    color: var(--deep);
    letter-spacing: 0.04em;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .app-title .icon { font-size: 1.6rem; }
  .app-subtitle {
    font-size: 0.8rem;
    color: var(--wave);
    margin-bottom: 28px;
    letter-spacing: 0.06em;
  }

  /* ─── CARD ─── */
  .card {
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 24px 16px;
    width: 100%;
    box-shadow: 0 8px 32px var(--shadow), 0 1px 0 rgba(255,255,255,0.8) inset;
    border: 1px solid rgba(255,255,255,0.6);
    overflow: hidden;
    overflow: hidden;
  }

  .card-label {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--ocean);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* ─── CHOICE ROWS ─── */
  .choice-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .choice-row:last-child { margin-bottom: 0; }

  /* Custom checkbox */
  .custom-cb {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 2px solid var(--foam);
    background: var(--white);
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    position: relative;
    flex-shrink: 0;
    transition: background 0.2s, border-color 0.2s;
  }
  .custom-cb:checked {
    background: var(--ocean);
    border-color: var(--ocean);
  }
  .custom-cb:checked::after {
    content: '✓';
    position: absolute;
    color: white;
    font-size: 13px;
    font-weight: 700;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  .choice-number {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    color: var(--foam);
    font-size: 0.85rem;
    width: 18px;
    flex-shrink: 0;
    text-align: center;
  }

  .choice-input {
    flex: 1;
    min-width: 0;
    border: 1.5px solid rgba(168,216,240,0.6);
    background: rgba(255,255,255,0.7);
    border-radius: 10px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 0.95rem;
    color: var(--deep);
    outline: none;
    padding: 10px 12px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .choice-input:focus {
    border-color: var(--ocean);
    box-shadow: 0 0 0 3px rgba(46,158,214,0.15);
  }
  .choice-input::placeholder { color: rgba(26,111,173,0.3); }

  /* ─── ERROR ─── */
  .error-msg {
    display: none;
    color: var(--error);
    font-size: 0.82rem;
    font-weight: 700;
    margin-top: 14px;
    padding: 10px 10px;
    background: rgba(224,85,85,0.08);
    border-radius: 10px;
    border-left: 3px solid var(--error);
  }
  .error-msg.visible { display: block; }

  /* ─── PRIMARY BUTTON ─── */
  .btn-primary {
    margin-top: 28px;
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--wave) 0%, var(--ocean) 100%);
    color: white;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(26,111,173,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(26,111,173,0.4);
  }
  .btn-primary:active { transform: translateY(0); }

  /* ─── ROULETTE SCREEN ─── */
  #roulette-screen {
    padding-top: 28px;
  }

  .roulette-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 10px 0 28px;
  }

  /* Pointer triangle */
  .pointer {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-size: 1.8rem;
    color: var(--deep);
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.18));
    line-height: 1;
  }

  canvas#roulette-canvas {
    border-radius: 50%;
    box-shadow: 0 8px 40px rgba(26,111,173,0.28), 0 0 0 6px rgba(255,255,255,0.5);
    display: block;
  }

  /* ─── SPIN BUTTON ─── */
  .spin-btn-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .btn-spin {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(145deg, var(--wave), var(--ocean));
    color: white;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(26,111,173,0.4), 0 2px 0 rgba(255,255,255,0.3) inset;
    transition: transform 0.15s, box-shadow 0.15s, background 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 2px;
  }
  .btn-spin .spin-icon { font-size: 1.5rem; }
  .btn-spin:hover {
    transform: scale(1.06);
    box-shadow: 0 10px 32px rgba(26,111,173,0.5);
  }
  .btn-spin:active { transform: scale(0.97); }
  .btn-spin.stopping {
    background: linear-gradient(145deg, #f0a500, #d48c00);
  }

  .spin-hint {
    font-size: 0.78rem;
    color: var(--wave);
    letter-spacing: 0.04em;
  }

  /* ─── POPUP OVERLAY ─── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(13,74,122,0.45);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .overlay.visible { display: flex; }

  .popup {
    background: white;
    border-radius: 28px;
    padding: 36px 28px 28px;
    width: 100%;
    max-width: 340px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(13,74,122,0.3);
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.8) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .popup-emoji { font-size: 2.8rem; margin-bottom: 10px; }

  .popup-result-label {
    font-size: 0.75rem;
    color: var(--wave);
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .popup-name {
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--deep);
    margin-bottom: 6px;
    word-break: break-all;
  }

  .popup-msg {
    font-size: 0.9rem;
    color: var(--ocean);
    margin-bottom: 28px;
    font-weight: 700;
  }

  .btn-end {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--wave), var(--ocean));
    color: white;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    box-shadow: 0 4px 16px rgba(26,111,173,0.3);
    transition: transform 0.15s;
  }
  .btn-end:hover { transform: translateY(-2px); }
</style>
</head>
<body>

<!-- ═══════════════ SETUP SCREEN ═══════════════ -->
<div id="setup-screen" class="screen active">
  <div class="app-title">迷ったらルーレット</div>
  <div class="app-subtitle">迷ったときの最強の味方</div>

  <div class="card">
    <div class="card-label">選択肢を入力してください</div>

    <div class="choice-row">
      <input type="checkbox" class="custom-cb" id="cb1">
      <span class="choice-number">1</span>
      <input type="text" class="choice-input" id="txt1" maxlength="20" placeholder="選択肢 1">
    </div>
    <div class="choice-row">
      <input type="checkbox" class="custom-cb" id="cb2">
      <span class="choice-number">2</span>
      <input type="text" class="choice-input" id="txt2" maxlength="20" placeholder="選択肢 2">
    </div>
    <div class="choice-row">
      <input type="checkbox" class="custom-cb" id="cb3">
      <span class="choice-number">3</span>
      <input type="text" class="choice-input" id="txt3" maxlength="20" placeholder="選択肢 3">
    </div>
    <div class="choice-row">
      <input type="checkbox" class="custom-cb" id="cb4">
      <span class="choice-number">4</span>
      <input type="text" class="choice-input" id="txt4" maxlength="20" placeholder="選択肢 4">
    </div>
    <div class="choice-row">
      <input type="checkbox" class="custom-cb" id="cb5">
      <span class="choice-number">5</span>
      <input type="text" class="choice-input" id="txt5" maxlength="20" placeholder="選択肢 5">
    </div>

    <div class="error-msg" id="error-msg"></div>
  </div>

  <button class="btn-primary" id="start-btn">ルーレットを始める →</button>
</div>

<!-- ═══════════════ ROULETTE SCREEN ═══════════════ -->
<div id="roulette-screen" class="screen">
  <div class="app-title">迷ったらルーレット</div>
  <div class="app-subtitle">ボタンを押して回そう！</div>

  <div class="roulette-wrapper">
    <div class="pointer">▽</div>
    <canvas id="roulette-canvas" width="300" height="300"></canvas>
  </div>

  <div class="spin-btn-wrap">
    <button class="btn-spin" id="spin-btn">
      <span class="spin-icon">▶</span>
      <span id="spin-label">スタート</span>
    </button>
    <div class="spin-hint" id="spin-hint">押すと回り始めます</div>
  </div>
</div>

<!-- ═══════════════ RESULT POPUP ═══════════════ -->
<div class="overlay" id="overlay">
  <div class="popup">
    <div class="popup-emoji">🎉</div>
    <div class="popup-result-label">選ばれたのは</div>
    <div class="popup-name" id="popup-name"></div>
    <div class="popup-msg">が選ばれました！</div>
    <button class="btn-end" id="end-btn">終了</button>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────
const COLORS = ['#5bb8f5','#2e9ed6','#a8d8f0','#1a6fad','#7ecef4'];
let choices = [];
let currentAngle = 0;     // radians, current rotation of wheel
let spinSpeed = 0;        // radians per frame
let animFrame = null;
let spinning = false;
let stopping = false;

// ─── ELEMENTS ────────────────────────────────
const setupScreen  = document.getElementById('setup-screen');
const rouletteScreen = document.getElementById('roulette-screen');
const startBtn     = document.getElementById('start-btn');
const errorMsg     = document.getElementById('error-msg');
const canvas       = document.getElementById('roulette-canvas');
const ctx          = canvas.getContext('2d');
const spinBtn      = document.getElementById('spin-btn');
const spinLabel    = document.getElementById('spin-label');
const spinHint     = document.getElementById('spin-hint');
const overlay      = document.getElementById('overlay');
const popupName    = document.getElementById('popup-name');
const endBtn       = document.getElementById('end-btn');

// ─── RESPONSIVE CANVAS ────────────────────────
function resizeCanvas() {
  const size = Math.min(window.innerWidth - 60, 320);
  canvas.width  = size;
  canvas.height = size;
  drawWheel();
}

// ─── SETUP SCREEN LOGIC ──────────────────────
startBtn.addEventListener('click', () => {
  errorMsg.classList.remove('visible');
  const checked = [];

  for (let i = 1; i <= 5; i++) {
    const cb  = document.getElementById(`cb${i}`);
    const txt = document.getElementById(`txt${i}`);
    if (cb.checked) {
      if (!txt.value.trim()) {
        showError('選択肢名を入力してください');
        return;
      }
      checked.push(txt.value.trim());
    }
  }

  if (checked.length < 2) {
    showError('2つ以上選んでください');
    return;
  }

  choices = checked;
  currentAngle = 0;
  spinning = false;
  stopping = false;
  spinSpeed = 0;
  resetSpinBtn();

  setupScreen.classList.remove('active');
  rouletteScreen.classList.add('active');
  resizeCanvas();
});

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.classList.add('visible');
}

// ─── DRAW WHEEL ──────────────────────────────
function drawWheel() {
  const cx = canvas.width  / 2;
  const cy = canvas.height / 2;
  const r  = cx - 4;
  const n  = choices.length;
  const sliceAngle = (2 * Math.PI) / n;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < n; i++) {
    const start = currentAngle + i * sliceAngle - Math.PI / 2;
    const end   = start + sliceAngle;

    // Slice
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // Label
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + sliceAngle / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#0d4a7a';
    const fontSize = Math.max(11, Math.min(16, r * 0.13));
    ctx.font = `bold ${fontSize}px 'Zen Kaku Gothic New', sans-serif`;
    ctx.shadowColor = 'rgba(255,255,255,0.6)';
    ctx.shadowBlur = 3;
    ctx.fillText(choices[i], r - 10, fontSize * 0.38);
    ctx.restore();
  }

  // Center circle
  ctx.beginPath();
  ctx.arc(cx, cy, 14, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.strokeStyle = '#1a6fad';
  ctx.lineWidth = 3;
  ctx.stroke();
}

// ─── SPIN LOGIC ──────────────────────────────
const BASE_SPEED = 0.32; // rad/frame — fast enough to be unpredictable

spinBtn.addEventListener('click', () => {
  if (!spinning) {
    // Start spinning
    spinning  = true;
    stopping  = false;
    spinSpeed = BASE_SPEED;
    spinBtn.classList.remove('stopping');
    spinBtn.querySelector('.spin-icon').textContent = '⏹';
    spinLabel.textContent = 'ストップ';
    spinHint.textContent  = 'もう一度押すと止まります';
    cancelAnimationFrame(animFrame);
    animate();
  } else if (!stopping) {
    // Begin stop sequence
    stopping = true;
    spinBtn.classList.add('stopping');
    spinBtn.querySelector('.spin-icon').textContent = '…';
    spinLabel.textContent = '減速中';
    spinBtn.disabled = true;
  }
});

function animate() {
  if (!spinning) return;

  if (stopping) {
    // Ease-out deceleration: target ~2.5 sec to stop
    // Decay factor chosen so speed → 0 over ~150 frames
    spinSpeed *= 0.965;
    if (spinSpeed < 0.0008) {
      spinSpeed = 0;
      spinning  = false;
      stopping  = false;
      currentAngle = normaliseAngle(currentAngle);
      drawWheel();
      showResult();
      return;
    }
  }

  currentAngle = normaliseAngle(currentAngle + spinSpeed);
  drawWheel();
  animFrame = requestAnimationFrame(animate);
}

function normaliseAngle(a) {
  return a % (2 * Math.PI);
}

// ─── RESULT ──────────────────────────────────
function showResult() {
  // ▽ pointer is at top = angle 0 relative to canvas centre = -π/2 in standard coords
  // Wheel is drawn with slice i starting at: currentAngle + i*sliceAngle - π/2
  // The pointer sits at -π/2 in canvas space, i.e. pure "top"
  // We need to find which slice contains angle = -π/2 (i.e. top)
  // In our drawing: slice i covers [currentAngle + i*slice - π/2,  currentAngle + (i+1)*slice - π/2]
  // Pointer at canvas-top corresponds to angle 0 in the untransformed system
  // Simpler: rotate pointer angle back into wheel coords.

  const n          = choices.length;
  const sliceAngle = (2 * Math.PI) / n;
  // pointer is at top of canvas = -π/2 in standard math angle
  // our slices start from currentAngle - π/2
  // so pointer's position in "wheel local" = ((-π/2) - (currentAngle - π/2) + 2π) % 2π
  //                                        = (-currentAngle + 2π) % 2π
  const pointerLocal = ((-currentAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  const idx = Math.floor(pointerLocal / sliceAngle) % n;

  popupName.textContent = choices[idx];
  overlay.classList.add('visible');
}

// ─── END / RESET ─────────────────────────────
endBtn.addEventListener('click', () => {
  overlay.classList.remove('visible');
  rouletteScreen.classList.remove('active');
  setupScreen.classList.add('active');

  // Clear inputs
  for (let i = 1; i <= 5; i++) {
    document.getElementById(`cb${i}`).checked = false;
    document.getElementById(`txt${i}`).value  = '';
  }
  errorMsg.classList.remove('visible');

  // Reset spin state
  spinning  = false;
  stopping  = false;
  spinSpeed = 0;
  cancelAnimationFrame(animFrame);
  resetSpinBtn();
});

function resetSpinBtn() {
  spinBtn.disabled = false;
  spinBtn.classList.remove('stopping');
  spinBtn.querySelector('.spin-icon').textContent = '▶';
  spinLabel.textContent = 'スタート';
  spinHint.textContent  = '押すと回り始めます';
}

// ─── INIT ────────────────────────────────────
window.addEventListener('resize', () => {
  if (rouletteScreen.classList.contains('active')) resizeCanvas();
});
</script>

</body>
</html>
